<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro da Apresentação - Slide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .btn-shadow { 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.1s;
        }
        .btn-shadow:active {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            transform: scale(0.98);
        }

        /* Classes para os botões selecionados no carrossel */
        .mov-ativo { background-color: #052A80 !important; color: white !important; border-color: #052A80 !important; }
        .comp-ativo { background-color: #052A80 !important; color: white !important; border-color: #052A80 !important; }
        
        /* Ocultar slides inativos */
        .slide-hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#f8fafc] h-[100dvh] flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-100 px-6 py-3 pt-10 shrink-0">
        <div class="flex items-center justify-between">
            <button class="p-2 bg-slate-50 rounded-full text-slate-400 active:scale-90 transition-transform">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            
            <div class="text-center">
                <span class="text-[10px] font-bold text-[#052A80] uppercase tracking-[2px]">Métricas Customizadas</span>
                <h1 class="text-xl font-black text-[#0F172A] leading-tight mt-1">Análise de Sessão</h1>
            </div>

            <button class="p-2 bg-slate-50 rounded-full text-[#052A80] active:scale-90 transition-transform">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
    </header>

    <div class="flex-1 flex flex-col w-full h-full min-h-0">

        <section class="flex-[3] px-6 pt-5 pb-4 flex flex-col min-h-0">
            <div class="flex-1 bg-white rounded-[24px] p-5 shadow-sm border border-slate-100 relative w-full flex flex-col justify-between min-h-0">
                
                <button onclick="prevSlide()" class="absolute left-1 top-1/2 -translate-y-1/2 text-slate-300 p-2 active:scale-90 transition-transform z-10">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>

                <div id="slides-container" class="px-8 flex-1 flex flex-col justify-center text-center min-h-0 overflow-y-auto">
                    
                    <div id="slide-1" class="slide-content flex flex-col items-center justify-center h-full w-full">
                        <p class="text-sm font-black text-black uppercase tracking-widest mb-6 text-center leading-relaxed">1. Conseguiu completar o movimento?</p>
                        <div class="flex gap-4 w-full max-w-md mx-auto">
                            <button onclick="selecionarMovimento('Sim')" id="mov-Sim" class="btn-mov flex-1 py-8 rounded-2xl border-2 border-slate-200 text-black text-lg font-black uppercase active:scale-95 transition-all shrink-0">Sim</button>
                            <button onclick="selecionarMovimento('Não')" id="mov-Não" class="btn-mov flex-1 py-8 rounded-2xl border-2 border-slate-200 text-black text-lg font-black uppercase active:scale-95 transition-all shrink-0">Não</button>
                        </div>
                    </div>

                    <div id="slide-2" class="slide-content slide-hidden flex flex-col items-center justify-center h-full w-full">
                        <p class="text-[11px] font-black text-black uppercase tracking-widest mb-3 text-center leading-relaxed">2. Comportamento na atividade</p>
                        
                        <div class="flex flex-col gap-2 w-full max-w-md mx-auto">
                            <button onclick="selecionarComportamento(1)" id="comp-1" class="btn-comp w-full py-3 rounded-xl border-2 border-slate-200 text-black text-[11px] font-black uppercase active:scale-95 transition-all tracking-wide shrink-0">Resistiu totalmente</button>
                            <button onclick="selecionarComportamento(2)" id="comp-2" class="btn-comp w-full py-3 rounded-xl border-2 border-slate-200 text-black text-[11px] font-black uppercase active:scale-95 transition-all tracking-wide shrink-0">Alta resistência</button>
                            <button onclick="selecionarComportamento(3)" id="comp-3" class="btn-comp w-full py-3 rounded-xl border-2 border-slate-200 text-black text-[11px] font-black uppercase active:scale-95 transition-all tracking-wide shrink-0">Oscilou</button>
                            <button onclick="selecionarComportamento(4)" id="comp-4" class="btn-comp w-full py-3 rounded-xl border-2 border-slate-200 text-black text-[11px] font-black uppercase active:scale-95 transition-all tracking-wide shrink-0">Colaborou bem</button>
                            <button onclick="selecionarComportamento(5)" id="comp-5" class="btn-comp w-full py-3 rounded-xl border-2 border-slate-200 text-black text-[11px] font-black uppercase active:scale-95 transition-all tracking-wide shrink-0">Engajamento total</button>
                        </div>
                    </div>

                </div>

                <button onclick="nextSlide()" class="absolute right-1 top-1/2 -translate-y-1/2 text-[#052A80] p-2 active:scale-90 transition-transform z-10">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>

                <div class="flex justify-center gap-2 mt-3 shrink-0">
                    <div id="dot-1" class="dot w-6 h-2 bg-[#052A80] rounded-full transition-all duration-300"></div>
                    <div id="dot-2" class="dot w-2 h-2 bg-slate-200 rounded-full transition-all duration-300"></div>
                </div>
            </div>
        </section>

        <main class="flex-[2] bg-white rounded-t-[40px] shadow-[0_-15px_40px_rgba(0,0,0,0.05)] border-t border-slate-100 p-5 flex flex-col min-h-0">
            <div class="flex-1 grid grid-cols-2 grid-rows-2 gap-3">
                
                <button class="bg-[#ef4444] rounded-[24px] w-full h-full flex flex-col items-center justify-center gap-1.5 text-white shadow-md active:scale-95 transition-all group">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    <span class="text-xs font-black uppercase tracking-tight">Fuga</span>
                </button>

                <button class="bg-[#f97316] rounded-[24px] w-full h-full flex flex-col items-center justify-center gap-1.5 text-white shadow-md active:scale-95 transition-all group">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path></svg>
                    <span class="text-xs font-black uppercase tracking-tight text-center leading-none">Manual</span>
                </button>

                <button class="bg-[#eab308] rounded-[24px] w-full h-full flex flex-col items-center justify-center gap-1.5 text-white shadow-md active:scale-95 transition-all group">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                    <span class="text-xs font-black uppercase tracking-tight text-center leading-none">Verbal</span>
                </button>

                <button class="bg-[#22c55e] rounded-[24px] w-full h-full flex flex-col items-center justify-center gap-1.5 text-white shadow-md active:scale-95 transition-all group">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span class="text-xs font-black uppercase tracking-tight">Independente</span>
                </button>

            </div>
        </main>

    </div>

    <footer class="p-6 bg-white shrink-0 z-10 relative">
        <button class="w-full py-5 bg-[#052A80] rounded-[24px] text-white font-black text-sm uppercase tracking-[3px] shadow-lg active:scale-[0.97] transition-all">
            Salvar Registro
        </button>
    </footer>

    <script>
        let currentSlide = 1;
        const totalSlides = 2;

        function updateCarousel() {
            for(let i = 1; i <= totalSlides; i++) {
                document.getElementById(`slide-${i}`).classList.add('slide-hidden');
                
                const dot = document.getElementById(`dot-${i}`);
                if(dot) {
                    dot.classList.remove('w-6', 'bg-[#052A80]');
                    dot.classList.add('w-2', 'bg-slate-200');
                }
            }
            document.getElementById(`slide-${currentSlide}`).classList.remove('slide-hidden');
            const activeDot = document.getElementById(`dot-${currentSlide}`);
            if(activeDot) {
                activeDot.classList.remove('w-2', 'bg-slate-200');
                activeDot.classList.add('w-6', 'bg-[#052A80]');
            }
        }

        function nextSlide() {
            currentSlide = currentSlide === totalSlides ? 1 : currentSlide + 1;
            updateCarousel();
        }

        function prevSlide() {
            currentSlide = currentSlide === 1 ? totalSlides : currentSlide - 1;
            updateCarousel();
        }

        function selecionarMovimento(opcao) {
            document.querySelectorAll('.btn-mov').forEach(btn => {
                btn.classList.remove('mov-ativo');
                btn.classList.add('text-black', 'border-slate-200');
            });
            const ativo = document.getElementById(`mov-${opcao}`);
            ativo.classList.remove('text-black', 'border-slate-200');
            ativo.classList.add('mov-ativo');
        }

        function selecionarComportamento(id) {
            document.querySelectorAll('.btn-comp').forEach(btn => {
                btn.classList.remove('comp-ativo');
                btn.classList.add('text-black', 'border-slate-200');
            });
            const ativo = document.getElementById(`comp-${id}`);
            ativo.classList.remove('text-black', 'border-slate-200');
            ativo.classList.add('comp-ativo');
        }
    </script>
</body>
</html>
