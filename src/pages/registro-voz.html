<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro por Voz - PersonalTEA</title>
    <link rel="icon" href="../imagens/logo-personalTEA.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        /* Animação de pulso para o microfone ativo */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .pulse-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #e2e8f0;
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
    </style>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-white h-screen flex flex-col">

    <header class="p-6">
        <div class="flex flex-col">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[2px] mb-1">Sessão Ativa</span>
            <h1 class="text-2xl font-black text-[#0F172A] leading-tight">Plano de Equilíbrio</h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-10 text-center">
        
        <div class="relative w-48 h-48 flex items-center justify-center mb-12">
            <div class="pulse-effect"></div>
            <div class="pulse-effect" style="animation-delay: 1s"></div>
            
            <div class="relative w-32 h-32 bg-slate-100 rounded-full flex items-center justify-center shadow-inner">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </div>
        </div>

        <p class="text-slate-400 font-medium text-sm max-w-[200px]">
            Ouvindo as atividades do Lucas...
        </p>
    </main>

    <footer class="p-8">
        <button onclick="location.href='aluno.html'" 
                class="w-full bg-[#052A80] py-5 rounded-[20px] text-white font-black text-sm uppercase tracking-widest shadow-lg active:scale-[0.97] transition-all">
            Finalizar Sessão
        </button>
    </footer>

</body>
</html>
